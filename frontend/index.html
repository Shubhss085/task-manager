<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>task-manager - Sign In</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/static/icon.svg">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="auth-container">
<div class="auth-card" id="signinCard">
<div class="auth-header"><div class="logo">&#9776;</div><h1>task-manager</h1><p>Sign in to manage your tasks</p></div>
<form id="signinForm">
<div class="input-group"><label>Email or Phone</label><input type="text" id="loginIdentifier" placeholder="Enter email or phone" required></div>
<div class="input-group"><label>Password</label><input type="password" id="loginPassword" placeholder="Enter password" required></div>
<div class="form-options"><label class="checkbox-label"><input type="checkbox"> Remember me</label><a href="#" class="link" id="forgotLink">Forgot password?</a></div>
<button type="submit" class="btn-primary">Sign In</button>
<p class="auth-switch">Don't have an account? <a href="#" class="link" id="signupLink">Sign Up</a></p>
</form>
<div id="loginError" class="alert alert-error" style="display:none"></div>
</div>
<div class="auth-card" id="signupCard" style="display:none">
<div class="auth-header"><div class="logo">&#9776;</div><h1>Create Account</h1><p>Join task-manager today</p></div>
<form id="signupForm">
<div class="input-group"><label>Full Name</label><input type="text" id="signupName" placeholder="Your name"></div>
<div class="input-group"><label>Email</label><input type="email" id="signupEmail" placeholder="your@email.com" required></div>
<div class="input-group"><label>Phone (optional)</label><input type="tel" id="signupPhone" placeholder="+1 234 567 890"></div>
<div class="input-group"><label>Password</label><input type="password" id="signupPassword" placeholder="Min 6 characters" required></div>
<button type="submit" class="btn-primary">Create Account</button>
<p class="auth-switch">Already have an account? <a href="#" class="link" id="signinLink">Sign In</a></p>
</form>
<div id="signupError" class="alert alert-error" style="display:none"></div>
</div>
<div class="auth-card" id="forgotCard" style="display:none">
<div class="auth-header"><div class="logo">&#9776;</div><h1>Reset Password</h1><p>We'll send a reset link to your email</p></div>
<form id="forgotForm">
<div class="input-group"><label>Email</label><input type="email" id="forgotEmail" placeholder="your@email.com" required></div>
<button type="submit" class="btn-primary">Send Reset Link</button>
<p class="auth-switch"><a href="#" class="link" id="backToSignin">Back to Sign In</a></p>
</form>
<div id="forgotError" class="alert alert-error" style="display:none"></div>
<div id="forgotSuccess" class="alert alert-success" style="display:none"></div>
</div>
</div>
<script src="/static/script.js"></script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js')</script>
</body>
</html>
